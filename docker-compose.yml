# Dev baseline — runs native on the host architecture (no `platform:` set, fast on Apple Silicon).
# 3 Redis cache nodes + the API/dashboard. Only the app port is published; Redis stays internal
# (so it won't clash with a local brew Redis on 6379-6381).

x-redis: &redis
  image: redis:7-alpine
  command: ["redis-server", "--save", "", "--appendonly", "no"] # cache only, no persistence
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 3s
    retries: 5

services:
  redis-0: { <<: *redis }
  redis-1: { <<: *redis }
  redis-2: { <<: *redis }

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    environment:
      PORT: "3000"
      REDIS_NODES: "redis-0:6379,redis-1:6379,redis-2:6379"
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data # dataset CSV in, SQLite DB persisted out
    depends_on:
      redis-0: { condition: service_healthy }
      redis-1: { condition: service_healthy }
      redis-2: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
